spring:
  application:
    name: server
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/clean_stream
    username: postgres
    password: 90eugine
    driver-class-name: org.postgresql.Driver
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/clean_stream}
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# JWT Configuration
app:
  jwt:
    secret: "your-super-secret-key-change-this-in-production-minimum-256-bits-long"
    expiration-ms: 86400000  # 24 hours

# CORS Configuration
cors:
  allowed-origins: "http://localhost:3000,http://localhost:3001"

# N8N Webhook Configuration
n8n:
  webhook:
    url: https://koyo.app.n8n.cloud/webhook/clean-data

# FastAPI AI Engine configuration
fastapi:
  base-url: http://localhost:8000

server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    com.server.server: DEBUG
    org.hibernate.SQL: DEBUG
